# Tmux Configuration
# ===================

# Set prefix to Ctrl+A (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Start window and pane index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar configuration - Tokyo Night theme
set -g status-bg "#1a1b26"
set -g status-fg "#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #{session_name} #[bg=#1a1b26,fg=#7aa2f7]█"
set -g status-left-length 50
set -g status-right "#[fg=#7aa2f7]█#[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M #[bg=#1a1b26,fg=#7aa2f7] "
set -g status-right-length 50

# Window formatting
setw -g window-status-format "#[fg=#565f89]#I:#W"
setw -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold]#I:#W#[bg=#1a1b26,fg=#7aa2f7]"
setw -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# Copy mode (vi-like)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Easy window/pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Disable auto-rename windows
set -g allow-rename off
set -g automatic-rename off

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Configuration reloaded!"

# Sensible defaults from tmux-sensible
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g clock-mode-style 24

# Other keybindings
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# TPM Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# tmux-sessionx configuration
set -g @plugin 'joshmedeski/tmux-sessionx'
set -g @sessionx-bind 'O'
set -g @sessionx-zoxide-mode 'on'

# Tmux Continuum auto-restore
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
