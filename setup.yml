---
- name: Bootstrap dev machine (Ubuntu + macOS)
  hosts: localhost
  connection: local

  vars:
    user_home: "{{ ansible_env.HOME }}"
    dotfiles_dir: "{{ ansible_env.HOME }}/dotfiles"
    dotfiles_repo: "https://github.com/hassanjan1841/dotfiles.git"

  tasks:

    # ── macOS: Homebrew + packages ────────────────────────────────────────────
    - name: Install Homebrew (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /opt/homebrew/bin/brew

    - name: Install packages via Homebrew (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew:
        name: [git, curl, stow, restic, node, gh, just, fzf, bat, eza, zoxide, duf, fd, ripgrep, atuin]
        state: present

    # ── Ubuntu/Debian: apt packages ───────────────────────────────────────────
    - name: Install packages via apt (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      apt:
        name: [git, curl, gpg, unzip, zsh, stow, zenity, restic, gh, copyq, vlc, fzf, bat, taskwarrior, timewarrior, ncdu, btop, fd-find, ripgrep, flatpak, python3-pip]
        state: present
        update_cache: true

    # ── eza (Ubuntu) ──────────────────────────────────────────────────────────
    - name: Add eza GPG key (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        mkdir -p /etc/apt/keyrings
        curl -fsSL https://raw.githubusercontent.com/eza-community/eza/main/deb.asc | \
        gpg --yes --dearmor -o /etc/apt/keyrings/gierens.gpg
        chmod 644 /etc/apt/keyrings/gierens.gpg
      args:
        creates: /etc/apt/keyrings/gierens.gpg

    - name: Add eza apt repo (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      copy:
        dest: /etc/apt/sources.list.d/gierens.list
        content: |
          deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main

    - name: Install eza (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      apt:
        name: eza
        state: present
        update_cache: true

    # ── Cloudflare WARP (Ubuntu) ──────────────────────────────────────────────
    - name: Add Cloudflare WARP GPG key (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | \
        gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
      ignore_errors: true
      register: warp_gpg

    - name: Add Cloudflare WARP apt repo (Ubuntu)
      when: ansible_os_family == "Debian" and warp_gpg is succeeded
      become: true
      copy:
        dest: /etc/apt/sources.list.d/cloudflare-client.list
        content: |
          deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ {{ ansible_distribution_release }} main

    - name: Install Cloudflare WARP (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode and warp_gpg is succeeded
      become: true
      apt:
        name: cloudflare-warp
        state: present
        update_cache: true
      ignore_errors: true

    # ── duf (Ubuntu) ─────────────────────────────────────────────────────────
    - name: Install duf (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        LATEST=$(curl -s https://api.github.com/repos/muesli/duf/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
        curl -fsSL "https://github.com/muesli/duf/releases/download/v${LATEST}/duf_${LATEST}_linux_amd64.deb" -o /tmp/duf.deb
        dpkg -i /tmp/duf.deb && rm /tmp/duf.deb
      args:
        creates: /usr/bin/duf

    # ── zoxide (Ubuntu) ───────────────────────────────────────────────────────
    - name: Install zoxide (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: curl -fsSL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | bash
      args:
        creates: "{{ user_home }}/.local/bin/zoxide"

    # ── just (Ubuntu) — not in apt, install from GitHub releases ────────────
    - name: Install just (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        curl -fsSL https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      args:
        creates: /usr/local/bin/just

    # ── Cloudflare WARP (macOS) ───────────────────────────────────────────────
    - name: Install Cloudflare WARP via Homebrew cask (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew_cask:
        name: cloudflare-warp
        state: present

    - name: Install GUI apps via Homebrew cask (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew_cask:
        name: [zed, copyq]
        state: present

    # ── Google Chrome (Ubuntu) ────────────────────────────────────────────────
    - name: Add Chrome GPG key (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | \
        gpg --yes --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
      args:
        creates: /usr/share/keyrings/google-chrome-keyring.gpg

    - name: Add Chrome apt repo (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      copy:
        dest: /etc/apt/sources.list.d/google-chrome.list
        content: |
          deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] https://dl.google.com/linux/chrome/deb/ stable main

    - name: Install Google Chrome (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode
      become: true
      apt:
        name: google-chrome-stable
        state: present
        update_cache: true

    - name: Install Google Chrome via Homebrew cask (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew_cask:
        name: google-chrome
        state: present

    # ── AnyDesk (Ubuntu) ─────────────────────────────────────────────────────
    - name: Add AnyDesk GPG key (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        curl -fsSL https://keys.anydesk.com/repos/DEB-GPG-KEY | \
        gpg --yes --dearmor -o /usr/share/keyrings/anydesk-keyring.gpg
      args:
        creates: /usr/share/keyrings/anydesk-keyring.gpg

    - name: Add AnyDesk apt repo (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      copy:
        dest: /etc/apt/sources.list.d/anydesk.list
        content: |
          deb [signed-by=/usr/share/keyrings/anydesk-keyring.gpg] http://deb.anydesk.com/ all main

    - name: Install AnyDesk (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode
      become: true
      apt:
        name: anydesk
        state: present
        update_cache: true

    - name: Install AnyDesk via Homebrew cask (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew_cask:
        name: anydesk
        state: present

    - name: Install Node.js via NodeSource (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode
      become: true
      block:
        - get_url:
            url: https://deb.nodesource.com/setup_lts.x
            dest: /tmp/nodesource_setup.sh
            mode: "0755"
        - command: bash /tmp/nodesource_setup.sh
        - apt:
            name: nodejs
            state: present
            update_cache: true

    # ── NVM (both platforms) ──────────────────────────────────────────────────
    - name: Install NVM
      become: false
      shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
      args:
        creates: "{{ user_home }}/.nvm/nvm.sh"

    # ── Install Node LTS via NVM and set as default ──────────────────────────
    - name: Install Node LTS via NVM and set as default
      become: false
      shell: |
        . {{ user_home }}/.nvm/nvm.sh
        nvm install --lts
        nvm alias default 'lts/*'
      args:
        creates: "{{ user_home }}/.nvm/alias/default"

    # ── Global npm packages ───────────────────────────────────────────────────
    - name: Install global npm packages
      become: false
      shell: |
        . {{ user_home }}/.nvm/nvm.sh
        for pkg in "@anthropic-ai/claude-code" vercel typescript pnpm "@biomejs/biome" lighthouse opencode "@bitwarden/cli" tldr; do
          npm list -g --depth=0 "$pkg" &>/dev/null || npm install -g "$pkg"
        done
      ignore_errors: true

    # ── Bun ───────────────────────────────────────────────────────────────────
    - name: Install Bun
      become: false
      shell: curl -fsSL https://bun.sh/install | bash
      args:
        creates: "{{ user_home }}/.bun/bin/bun"

    # ── uv (Python tool manager) ──────────────────────────────────────────────
    - name: Install uv
      become: false
      shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: "{{ user_home }}/.local/bin/uv"

    # ── Oh My Zsh ─────────────────────────────────────────────────────────────
    - name: Install Oh My Zsh
      become: false
      shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      args:
        creates: "{{ user_home }}/.oh-my-zsh"

    - name: Install zsh-autosuggestions plugin
      become: false
      git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
      ignore_errors: true

    - name: Install zsh-syntax-highlighting plugin
      become: false
      git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting
        dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
      ignore_errors: true

    - name: Install Powerlevel10k theme
      become: false
      git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: "{{ user_home }}/.oh-my-zsh/custom/themes/powerlevel10k"
        depth: 1
      ignore_errors: true

    # ── Dotfiles via stow ─────────────────────────────────────────────────────
    - name: Clone dotfiles repo
      become: false
      git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dir }}"
        version: main
      ignore_errors: true

    - name: Set zsh as default shell (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh

    - name: Back up default shell configs that conflict with stow
      become: false
      shell: |
        for f in ~/.bashrc ~/.zshrc; do
          if [ -f "$f" ] && [ ! -L "$f" ]; then
            mv "$f" "${f}.bak"
          fi
        done

    - name: Stow home dotfile packages
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --restow bash git zsh dev p10k aliases"
      ignore_errors: true

    - name: Stow taskwarrior config (no-folding to keep task data out of git)
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --no-folding --restow taskwarrior"
      ignore_errors: true

    - name: Stow claude config (no-folding to preserve nested structure)
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --no-folding --restow claude"
      ignore_errors: true

    - name: Ensure Zed config dir exists
      become: false
      file:
        path: "{{ user_home }}/.config/zed"
        state: directory

    - name: Stow Zed config
      become: false
      shell: "stow -v --restow --target={{ user_home }}/.config/zed --dir={{ dotfiles_dir }} zed"
      ignore_errors: true

    # ── Zed editor (Ubuntu) ──────────────────────────────────────────────────
    - name: Install Zed (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: curl -fsSL https://zed.dev/install.sh | sh
      args:
        creates: "{{ user_home }}/.local/bin/zed"
      environment:
        SHELL: /bin/bash
      ignore_errors: true

    # ── WezTerm (Ubuntu) ─────────────────────────────────────────────────────
    - name: Add WezTerm GPG key (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      shell: |
        curl -fsSL https://apt.fury.io/wez/gpg.key | \
        gpg --yes --dearmor -o /usr/share/keyrings/wezterm-fury.gpg
      args:
        creates: /usr/share/keyrings/wezterm-fury.gpg

    - name: Add WezTerm apt repo (Ubuntu)
      when: ansible_os_family == "Debian"
      become: true
      copy:
        dest: /etc/apt/sources.list.d/wezterm.list
        content: |
          deb [signed-by=/usr/share/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *

    - name: Install WezTerm (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode
      become: true
      apt:
        name: wezterm
        state: present
        update_cache: true

    - name: Install WezTerm via Homebrew cask (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew_cask:
        name: wezterm
        state: present

    - name: Stow WezTerm config
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --restow wezterm"
      ignore_errors: true

    # ── startup.sh + GNOME autostart (Ubuntu only) ────────────────────────────
    - name: Stow startup script (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --restow startup"
      ignore_errors: true

    - name: Ensure startup.sh is executable (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode
      become: false
      file:
        path: "{{ user_home }}/startup.sh"
        mode: "0755"

    - name: Ensure autostart dir exists (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      file:
        path: "{{ user_home }}/.config/autostart"
        state: directory

    - name: Stow GNOME autostart entry (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: "stow -v --restow --target={{ user_home }}/.config/autostart --dir={{ dotfiles_dir }} autostart"
      ignore_errors: true

    - name: Copy startup-mac.sh (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      copy:
        src: "{{ dotfiles_dir }}/startup-mac.sh"
        dest: "{{ user_home }}/startup-mac.sh"
        mode: "0755"

    # ── JetBrainsMono Nerd Font (required by WezTerm config) ─────────────────
    - name: Install JetBrainsMono Nerd Font (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: |
        FONT_DIR="{{ user_home }}/.local/share/fonts/JetBrainsMono"
        mkdir -p "$FONT_DIR"
        LATEST=$(curl -s https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        curl -fsSL "https://github.com/ryanoasis/nerd-fonts/releases/download/${LATEST}/JetBrainsMono.tar.xz" \
          | tar -xJ -C "$FONT_DIR"
        fc-cache -f "$FONT_DIR"
      args:
        creates: "{{ user_home }}/.local/share/fonts/JetBrainsMono"

    # ── atuin (shell history sync) ────────────────────────────────────────────
    - name: Install atuin
      become: false
      shell: |
        LATEST=$(curl -s https://api.github.com/repos/atuinsh/atuin/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        curl -fsSL "https://github.com/atuinsh/atuin/releases/download/${LATEST}/atuin-x86_64-unknown-linux-musl.tar.gz" \
          | tar -xz --strip-components=1 -C /tmp atuin-x86_64-unknown-linux-musl/atuin
        mkdir -p {{ user_home }}/.atuin/bin
        mv /tmp/atuin {{ user_home }}/.atuin/bin/atuin
      args:
        creates: "{{ user_home }}/.atuin/bin/atuin"

    # ── Mission Center / System monitor ──────────────────────────────────────
    - name: Add Flathub remote (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      ignore_errors: true

    - name: Install Mission Center via Flatpak (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: flatpak install --user -y flathub net.nokyan.Resources
      args:
        creates: "{{ user_home }}/.local/share/flatpak/app/net.nokyan.Resources"
      ignore_errors: true

    - name: Install Stats system monitor via Homebrew cask (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      community.general.homebrew_cask:
        name: stats
        state: present
      ignore_errors: true

    # ── pre-commit ────────────────────────────────────────────────────────────
    - name: Install pre-commit via uv
      become: false
      shell: "{{ user_home }}/.local/bin/uv tool install pre-commit"
      args:
        creates: "{{ user_home }}/.local/bin/pre-commit"

    - name: Install pre-commit hooks in dotfiles repo
      become: false
      shell: "{{ user_home }}/.local/bin/pre-commit install"
      args:
        chdir: "{{ dotfiles_dir }}"
      ignore_errors: true

    # ── Notes directory structure ─────────────────────────────────────────────
    - name: Create ~/notes directory structure
      become: false
      file:
        path: "{{ user_home }}/notes/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - inbox
        - notes
        - projects
        - daily
        - templates

    - name: Stow notes templates
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --no-folding --restow notes"
      ignore_errors: true

    # ── bin/ scripts (hass CLI) ────────────────────────────────────────────────
    - name: Ensure ~/dotfiles/bin scripts are executable
      become: false
      file:
        path: "{{ dotfiles_dir }}/bin/hass"
        mode: "0755"

    # ── dashboard + daily scripts: ensure executable ──────────────────────────
    - name: Ensure scripts are executable
      become: false
      file:
        path: "{{ dotfiles_dir }}/scripts/{{ item }}"
        mode: "0755"
      loop:
        - dashboard.sh
        - daily.sh

    # ── systemd user timer for daily.sh (Ubuntu) ─────────────────────────────
    - name: Stow systemd user units (Ubuntu)
      when: ansible_os_family == "Debian"
      become: false
      shell: "cd {{ dotfiles_dir }} && stow -v --no-folding --restow systemd"
      ignore_errors: true

    - name: Enable and start daily systemd timer (Ubuntu)
      when: ansible_os_family == "Debian" and not ansible_check_mode
      become: false
      shell: |
        systemctl --user daemon-reload
        systemctl --user enable --now daily.timer
      ignore_errors: true

    # ── launchd daily timer (macOS) ───────────────────────────────────────────
    - name: Install launchd daily plist (macOS)
      when: ansible_os_family == "Darwin"
      become: false
      copy:
        dest: "{{ user_home }}/Library/LaunchAgents/com.hassan.daily.plist"
        mode: "0644"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>com.hassan.daily</string>
            <key>ProgramArguments</key>
            <array>
              <string>/bin/bash</string>
              <string>{{ dotfiles_dir }}/scripts/daily.sh</string>
            </array>
            <key>StartCalendarInterval</key>
            <dict>
              <key>Hour</key>
              <integer>9</integer>
              <key>Minute</key>
              <integer>0</integer>
            </dict>
            <key>StandardOutPath</key>
            <string>{{ user_home }}/.local/share/daily.log</string>
            <key>StandardErrorPath</key>
            <string>{{ user_home }}/.local/share/daily.log</string>
          </dict>
          </plist>

    - name: Load launchd daily agent (macOS)
      when: ansible_os_family == "Darwin" and not ansible_check_mode
      become: false
      shell: launchctl load -w "{{ user_home }}/Library/LaunchAgents/com.hassan.daily.plist"
      ignore_errors: true
